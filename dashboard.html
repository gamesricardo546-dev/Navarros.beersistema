<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAVARROS.BEER – Dashboard</title>
<script>!function(){var a=null;try{a=JSON.parse(localStorage.getItem('nb_auth'))}catch(e){}if(!a){location.replace('login.html');}else if(a.role==='garcom'){location.replace('garcom.html');}}();</script>
<link rel="stylesheet" href="css/style.css">
<style>
/* ── PAGE ── */
.dash-wrap { max-width:1280px; margin:0 auto; padding:28px 20px; }
.dash-heading { font-size:22px; font-weight:700; margin-bottom:4px; }
.dash-sub { font-size:13px; color:#666; margin-bottom:28px; }

/* ── PERIOD TABS ── */
.period-tabs { display:flex; gap:4px; margin-bottom:24px; flex-wrap:wrap; }
.period-tab {
  padding:6px 18px; border-radius:6px; font-size:13px; font-weight:600;
  border:1.5px solid #ddd; background:#fff; color:#666;
  cursor:pointer; transition:0.15s;
}
.period-tab.active { background:#111; color:#fff; border-color:#111; }

/* ── KPI CARDS ── */
.kpi-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; margin-bottom:28px; }
.kpi-card {
  background:#fff; border:1px solid #e5e5e5; border-radius:12px;
  padding:20px; display:flex; flex-direction:column; gap:8px;
  transition:box-shadow 0.15s;
}
.kpi-card:hover { box-shadow:0 4px 20px rgba(0,0,0,0.08); }
.kpi-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:#999; }
.kpi-value { font-size:26px; font-weight:800; color:#111; line-height:1; }
.kpi-value.green { color:#16a34a; }
.kpi-value.blue  { color:#2563eb; }
.kpi-sub { font-size:12px; color:#999; display:flex; align-items:center; gap:5px; }
.kpi-badge { display:inline-block; padding:2px 7px; border-radius:20px; font-size:11px; font-weight:700; }
.kpi-badge.up   { background:#dcfce7; color:#15803d; }
.kpi-badge.down { background:#fee2e2; color:#b91c1c; }
.kpi-badge.neu  { background:#f3f4f6; color:#6b7280; }

/* ── CHART + TOP PROD ── */
.charts-row { display:grid; grid-template-columns:2fr 1fr; gap:20px; margin-bottom:28px; }
.card {
  background:#fff; border:1px solid #e5e5e5; border-radius:12px; padding:22px;
}
.card-title { font-size:14px; font-weight:700; margin-bottom:18px; color:#111; }
.card-sub   { font-size:12px; color:#999; font-weight:400; margin-left:6px; }

/* ── BAR CHART ── */
.bar-chart { display:flex; align-items:flex-end; gap:10px; height:160px; padding-bottom:28px; position:relative; }
.bar-wrap {
  flex:1; display:flex; flex-direction:column; align-items:center;
  height:100%; justify-content:flex-end; position:relative;
}
.bar {
  width:100%; background:#111; border-radius:5px 5px 0 0;
  min-height:3px; transition:height 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
  position:relative;
}
.bar.today { background:#000; }
.bar-val {
  position:absolute; top:-20px; left:50%; transform:translateX(-50%);
  font-size:10px; font-weight:700; color:#555; white-space:nowrap;
}
.bar-lbl {
  position:absolute; bottom:-22px; left:50%; transform:translateX(-50%);
  font-size:11px; color:#999; white-space:nowrap;
}
.chart-empty { color:#bbb; font-size:13px; text-align:center; padding:40px 0; }

/* ── TOP PRODUTOS ── */
.top-prod-list { display:flex; flex-direction:column; gap:10px; }
.top-prod-item { display:flex; align-items:center; gap:10px; }
.top-prod-rank { font-size:11px; font-weight:800; color:#ccc; min-width:16px; text-align:center; }
.top-prod-info { flex:1; min-width:0; }
.top-prod-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.top-prod-bar-bg { height:4px; background:#f3f4f6; border-radius:2px; margin-top:4px; }
.top-prod-bar-fill { height:4px; background:#111; border-radius:2px; transition:width 0.5s; }
.top-prod-qty { font-size:12px; font-weight:700; color:#555; white-space:nowrap; }

/* ── BOTTOM ROW ── */
.bottom-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; margin-bottom:28px; }

/* ── TIPOS DE PEDIDO ── */
.order-type-list { display:flex; flex-direction:column; gap:10px; }
.order-type-item { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; background:#f9f9f9; border-radius:8px; }
.order-type-label { display:flex; align-items:center; gap:8px; font-size:13px; font-weight:600; }
.order-type-dot { width:9px; height:9px; border-radius:50%; }
.order-type-count { font-size:13px; font-weight:700; color:#111; }
.order-type-val { font-size:12px; color:#666; }

/* ── ALERTAS ESTOQUE ── */
.alert-list { display:flex; flex-direction:column; gap:8px; }
.alert-item { display:flex; align-items:center; gap:10px; padding:10px 13px; border-radius:8px; border:1px solid #fde68a; background:#fffbeb; }
.alert-item.critical { border-color:#fca5a5; background:#fff1f1; }
.alert-icon { font-size:1rem; }
.alert-info { flex:1; min-width:0; }
.alert-name { font-size:12px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.alert-qty  { font-size:11px; color:#92400e; }
.alert-item.critical .alert-qty { color:#b91c1c; }

/* ── ATIVIDADE RECENTE ── */
.activity-list { display:flex; flex-direction:column; gap:8px; max-height:260px; overflow-y:auto; }
.activity-item { display:flex; align-items:flex-start; gap:10px; padding:9px 12px; background:#f9f9f9; border-radius:8px; }
.activity-icon { font-size:1rem; flex-shrink:0; }
.activity-info { flex:1; min-width:0; }
.activity-title { font-size:12px; font-weight:600; color:#111; }
.activity-time  { font-size:11px; color:#999; margin-top:1px; }
.activity-price { font-size:13px; font-weight:700; color:#111; white-space:nowrap; }

/* ── RESPONSIVE ── */
@media (max-width:900px) {
  .charts-row  { grid-template-columns:1fr; }
  .bottom-row  { grid-template-columns:1fr 1fr; }
}
@media (max-width:600px) {
  .bottom-row  { grid-template-columns:1fr; }
  .kpi-grid    { grid-template-columns:1fr 1fr; }
}
</style>
</head>
<body>
<nav class="navbar">
  <div class="nav-brand">🍺 <strong>NAVARROS.BEER</strong></div>
  <div class="nav-links">
    <a href="index.html">Painel de Mesas</a>
    <a href="pedidos.html">Pedidos</a>
    <a href="configuracoes.html">Configurações</a>
  </div>
</nav>

<div class="dash-wrap">
  <div id="dashHeadingWrap">
    <div class="dash-heading" id="dashGreeting">Carregando…</div>
    <div class="dash-sub" id="dashDate"></div>
  </div>

  <div class="period-tabs">
    <button class="period-tab active" onclick="setPeriod('semana',this)">Esta Semana</button>
    <button class="period-tab" onclick="setPeriod('mes',this)">Este Mês</button>
    <button class="period-tab" onclick="setPeriod('ano',this)">Este Ano</button>
    <button class="period-tab" onclick="setPeriod('total',this)">Todo Período</button>
  </div>

  <!-- KPIs -->
  <div class="kpi-grid" id="kpiGrid"></div>

  <!-- Gráfico + Top Produtos -->
  <div class="charts-row">
    <div class="card">
      <div class="card-title">Faturamento dos últimos 7 dias <span class="card-sub" id="chartTotal"></span></div>
      <div class="bar-chart" id="barChart"></div>
    </div>
    <div class="card">
      <div class="card-title">Top Produtos <span class="card-sub">por quantidade</span></div>
      <div class="top-prod-list" id="topProdList"></div>
    </div>
  </div>

  <!-- Bottom row -->
  <div class="bottom-row">
    <div class="card">
      <div class="card-title">Pedidos por Tipo</div>
      <div class="order-type-list" id="orderTypeList"></div>
    </div>
    <div class="card">
      <div class="card-title">⚠️ Alertas de Estoque</div>
      <div class="alert-list" id="alertList"></div>
    </div>
    <div class="card">
      <div class="card-title">Atividade Recente</div>
      <div class="activity-list" id="activityList"></div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
authRenderNav();

let currentPeriod = 'semana';

/* ── Helpers ── */
function fmt(v) { return 'R$ ' + Number(v||0).toFixed(2).replace('.',','); }
function fmtDate(ts) {
  return new Date(ts).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function startOfDay(ts) {
  const d = new Date(ts); d.setHours(0,0,0,0); return d.getTime();
}

/* ── Init ── */
DB.onReady(() => {
  const user = authGetUser();
  const hour = new Date().getHours();
  const greet = hour < 12 ? 'Bom dia' : hour < 18 ? 'Boa tarde' : 'Boa noite';
  document.getElementById('dashGreeting').textContent = `${greet}, ${user?.nome || 'Dono'}! 👋`;
  document.getElementById('dashDate').textContent = new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  renderDash();
});

function setPeriod(p, btn) {
  currentPeriod = p;
  document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderDash();
}

/* ── Calcular todos os registros de receita ── */
function getAllRevenue() {
  const hist = DB.getHistorico();
  const ext  = DB.getPedidosExternos();
  const rows = [];

  hist.forEach(h => {
    rows.push({ ts: h.fechadoEm, valor: h.total || 0, tipo: 'mesa', itens: h.pedidos || [] });
  });

  ext.forEach(e => {
    if (e.statusAprovacao === 'rejeitado' || e.statusAprovacao === 'cancelado') return;
    const val = (e.itens||[]).reduce((s,i) => s + (i.preco||0)*(i.quantidade||0), 0);
    rows.push({ ts: e.criadoEm, valor: val, tipo: e.tipo || 'retirada', itens: e.itens||[] });
  });

  return rows.sort((a,b) => b.ts - a.ts);
}

function filterByPeriod(rows, period) {
  const now = Date.now();
  const today = startOfDay(now);
  if (period === 'semana') return rows.filter(r => r.ts >= today - 6*86400000);
  if (period === 'mes')    return rows.filter(r => r.ts >= new Date(new Date().getFullYear(), new Date().getMonth(),1).getTime());
  if (period === 'ano')    return rows.filter(r => r.ts >= new Date(new Date().getFullYear(),0,1).getTime());
  return rows;
}

/* ── Render ── */
function renderDash() {
  const all = getAllRevenue();
  const filtered = filterByPeriod(all, currentPeriod);
  renderKPIs(all, filtered);
  renderBarChart(all);
  renderTopProd(filtered);
  renderOrderTypes(filtered);
  renderAlertEstoque();
  renderActivity(all);
}

function renderKPIs(all, filtered) {
  const now = Date.now();
  const today = startOfDay(now);

  const fVal  = filtered.reduce((s,r) => s + r.valor, 0);
  const fCnt  = filtered.length;
  const todayVal = all.filter(r => r.ts >= today).reduce((s,r) => s + r.valor, 0);
  const todayCnt = all.filter(r => r.ts >= today).length;
  const ticket   = fCnt > 0 ? fVal / fCnt : 0;
  const allVal   = all.reduce((s,r) => s + r.valor, 0);

  const periodLabel = { semana:'Semana', mes:'Mês', ano:'Ano', total:'Total' }[currentPeriod];

  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi-card">
      <div class="kpi-label">Hoje</div>
      <div class="kpi-value green">${fmt(todayVal)}</div>
      <div class="kpi-sub">${todayCnt} pedido${todayCnt !== 1 ? 's' : ''}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Esta ${periodLabel}</div>
      <div class="kpi-value">${fmt(fVal)}</div>
      <div class="kpi-sub">${fCnt} pedido${fCnt !== 1 ? 's' : ''}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Ticket Médio</div>
      <div class="kpi-value blue">${fmt(ticket)}</div>
      <div class="kpi-sub">no período</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Faturamento Total</div>
      <div class="kpi-value">${fmt(allVal)}</div>
      <div class="kpi-sub">${all.length} pedidos histórico</div>
    </div>`;
}

function renderBarChart(all) {
  const today = startOfDay(Date.now());
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const dayStart = today - i * 86400000;
    const dayEnd   = dayStart + 86400000;
    const val = all.filter(r => r.ts >= dayStart && r.ts < dayEnd).reduce((s,r) => s+r.valor, 0);
    const d = new Date(dayStart);
    const label = i === 0 ? 'Hoje' : d.toLocaleDateString('pt-BR',{weekday:'short'}).replace('.','');
    days.push({ label, value: val, isToday: i === 0 });
  }
  const maxVal = Math.max(...days.map(d => d.value), 1);
  const total7 = days.reduce((s,d) => s + d.value, 0);
  document.getElementById('chartTotal').textContent = '— ' + fmt(total7);

  if (total7 === 0) {
    document.getElementById('barChart').innerHTML = '<div class="chart-empty">Nenhum pedido registrado esta semana.</div>';
    return;
  }

  document.getElementById('barChart').innerHTML = days.map(d => {
    const pct = Math.round((d.value / maxVal) * 100);
    const valLabel = d.value > 0 ? 'R$' + d.value.toFixed(0) : '';
    return `
    <div class="bar-wrap">
      <div class="bar${d.isToday ? ' today' : ''}" style="height:${Math.max(pct,2)}%">
        ${valLabel ? `<span class="bar-val">${valLabel}</span>` : ''}
      </div>
      <span class="bar-lbl">${d.label}</span>
    </div>`;
  }).join('');
}

function renderTopProd(rows) {
  const count = {};
  rows.forEach(r => {
    (r.itens || []).forEach(it => {
      const nome = it.nome || '?';
      if (!count[nome]) count[nome] = { nome, qtd: 0, val: 0 };
      count[nome].qtd += it.quantidade || 1;
      count[nome].val += (it.preco||0) * (it.quantidade||1);
    });
  });
  const top = Object.values(count).sort((a,b) => b.qtd - a.qtd).slice(0,6);
  const maxQ = top[0]?.qtd || 1;

  const el = document.getElementById('topProdList');
  if (!top.length) { el.innerHTML = '<div style="color:#bbb;font-size:13px;text-align:center;padding:20px 0">Sem dados no período.</div>'; return; }

  el.innerHTML = top.map((p, i) => `
    <div class="top-prod-item">
      <div class="top-prod-rank">${i+1}</div>
      <div class="top-prod-info">
        <div class="top-prod-name">${p.nome}</div>
        <div class="top-prod-bar-bg">
          <div class="top-prod-bar-fill" style="width:${Math.round(p.qtd/maxQ*100)}%"></div>
        </div>
      </div>
      <div class="top-prod-qty">${p.qtd}×</div>
    </div>`).join('');
}

function renderOrderTypes(rows) {
  const types = { mesa: 0, retirada: 0, 'tele-entrega': 0 };
  const vals  = { mesa: 0, retirada: 0, 'tele-entrega': 0 };
  rows.forEach(r => {
    const t = r.tipo in types ? r.tipo : 'mesa';
    types[t]++;
    vals[t] += r.valor;
  });
  const configs = [
    { key:'mesa',         label:'Mesa',     icon:'🪑', color:'#111' },
    { key:'retirada',     label:'Retirada', icon:'🏪', color:'#555' },
    { key:'tele-entrega', label:'Delivery', icon:'🛵', color:'#888' },
  ];
  document.getElementById('orderTypeList').innerHTML = configs.map(c => `
    <div class="order-type-item">
      <div class="order-type-label">
        <span class="order-type-dot" style="background:${c.color}"></span>
        ${c.icon} ${c.label}
      </div>
      <div style="text-align:right">
        <div class="order-type-count">${types[c.key]}</div>
        <div class="order-type-val">${fmt(vals[c.key])}</div>
      </div>
    </div>`).join('');
}

function renderAlertEstoque() {
  const prods = DB.getTodosProdutos();
  const alerts = prods.filter(p => p.ativo !== false && (p.estoque ?? 999) <= (p.estoqueMin ?? 5));
  const el = document.getElementById('alertList');
  if (!alerts.length) {
    el.innerHTML = '<div style="color:#16a34a;font-size:13px;text-align:center;padding:16px 0">✅ Estoque OK</div>';
    return;
  }
  el.innerHTML = alerts.slice(0,8).map(p => {
    const crit = p.estoque === 0;
    return `
    <div class="alert-item${crit ? ' critical' : ''}">
      <span class="alert-icon">${crit ? '🚨' : '⚠️'}</span>
      <div class="alert-info">
        <div class="alert-name">${p.nome}</div>
        <div class="alert-qty">Estoque: ${p.estoque} ${crit ? '(ZERADO)' : `/ mín ${p.estoqueMin}`}</div>
      </div>
      <a href="produtos.html" style="font-size:11px;color:#555;text-decoration:none;font-weight:600">Ajustar →</a>
    </div>`;
  }).join('');
}

function renderActivity(all) {
  const recentes = all.slice(0, 12);
  const el = document.getElementById('activityList');
  if (!recentes.length) {
    el.innerHTML = '<div style="color:#bbb;font-size:13px;text-align:center;padding:20px 0">Nenhuma atividade registrada.</div>';
    return;
  }
  const icons = { mesa:'🪑', retirada:'🏪', 'tele-entrega':'🛵' };
  el.innerHTML = recentes.map(r => `
    <div class="activity-item">
      <span class="activity-icon">${icons[r.tipo] || '📋'}</span>
      <div class="activity-info">
        <div class="activity-title">Pedido ${r.tipo === 'mesa' ? 'mesa' : r.tipo === 'tele-entrega' ? 'delivery' : 'retirada'}</div>
        <div class="activity-time">${fmtDate(r.ts)}</div>
      </div>
      <div class="activity-price">${fmt(r.valor)}</div>
    </div>`).join('');
}
</script>
</body>
</html>
